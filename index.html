<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Farm">
<meta name="theme-color" content="#0b132b">
<title>Grepolis Farm Timer</title>
<style>
  :root{ --bg:#0b132b; --card:#1c2541; --accent:#5bc0be; --text:#e8eef2; --muted:#8d9db6; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:max(20px,env(safe-area-inset-top)) 18px max(20px,env(safe-area-inset-bottom));
    min-height:100%;
  }
  h1{ font-size:1.3rem; font-weight:600; margin:6px 0 2px; }
  .sub{ color:var(--muted); font-size:.85rem; margin-bottom:18px; }
  .buttons{ display:flex; flex-direction:column; gap:14px; width:100%; max-width:420px; }
  button.timer{
    appearance:none; border:none; border-radius:18px;
    background:var(--card); color:var(--text);
    font-size:1.4rem; font-weight:600; padding:26px; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
    transition:transform .08s ease, background .2s ease;
  }
  button.timer:active{ transform:scale(.97); background:#24314f; }
  button.timer .emoji{ font-size:1.5rem; }
  .status{ margin:18px 0 4px; min-height:1.4em; font-size:.95rem; text-align:center; }
  .status.ok{ color:var(--accent); }
  .status.err{ color:#ff6b6b; }
  .timers{ width:100%; max-width:420px; display:flex; flex-direction:column; gap:10px; margin-top:6px; }
  .chip{
    display:flex; justify-content:space-between; align-items:center;
    background:#16203c; border:1px solid #243156; border-radius:12px; padding:12px 14px; font-size:.95rem;
  }
  .chip .cd{ font-variant-numeric:tabular-nums; color:var(--accent); font-weight:600; }
  .chip.done .cd{ color:var(--muted); }
  .chip .x{ color:var(--muted); padding:4px 10px; cursor:pointer; }
  .config{ width:100%; max-width:420px; margin-top:auto; padding-top:24px; }
  .config label{ display:block; color:var(--muted); font-size:.8rem; margin-bottom:6px; }
  .config input{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid #243156;
    background:#0f1830; color:var(--text); font-size:1rem;
  }
  .hint{ color:var(--muted); font-size:.75rem; margin-top:8px; line-height:1.45; }
</style>
</head>
<body>
  <h1>&#9203; Grepolis Farm</h1>
  <div class="sub">Tik zodra je gefarmd hebt</div>

  <div class="buttons">
    <button class="timer" data-delay="10min" data-label="10 min"><span>10 minuten</span><span class="emoji">&#127806;</span></button>
    <button class="timer" data-delay="40min" data-label="40 min"><span>40 minuten</span><span class="emoji">&#127806;</span></button>
    <button class="timer" data-delay="3h" data-label="3 uur"><span>3 uur</span><span class="emoji">&#127806;</span></button>
  </div>

  <div id="status" class="status"></div>
  <div id="timers" class="timers"></div>

  <div class="config">
    <label for="topic">ntfy topic (jouw geheime kanaalnaam)</label>
    <input id="topic" type="text" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="bijv. grepolis-farm-xY7k2">
    <div class="hint">
      Installeer de gratis <b>ntfy</b>-app op je iPhone en abonneer op exact deze topicnaam.
      Houd 'm geheim &mdash; iedereen die de naam kent kan meelezen en meesturen.
    </div>
  </div>

<script>
(function(){
  const NTFY = 'https://ntfy.sh';
  const DUR = { '10min':600000, '40min':2400000, '3h':10800000 };
  const $ = s => document.querySelector(s);
  const topicInput = $('#topic'), statusEl = $('#status'), timersEl = $('#timers');

  let topic = localStorage.getItem('ntfyTopic') || ('grepolis-farm-' + Math.random().toString(36).slice(2,8));
  topicInput.value = topic;
  localStorage.setItem('ntfyTopic', topic);
  topicInput.addEventListener('input', () => {
    topic = topicInput.value.trim();
    localStorage.setItem('ntfyTopic', topic);
  });

  function setStatus(msg, cls){ statusEl.textContent = msg; statusEl.className = 'status' + (cls ? ' ' + cls : ''); }

  let timers = JSON.parse(localStorage.getItem('activeTimers') || '[]');
  function saveTimers(){ localStorage.setItem('activeTimers', JSON.stringify(timers)); }

  function fmt(ms){
    if(ms < 0) ms = 0;
    const s = Math.round(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    return (h?h+':':'') + String(m).padStart(h?2:1,'0') + ':' + String(sec).padStart(2,'0');
  }
  function hhmm(d){ return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }

  function render(){
    // verlopen timers ouder dan een uur automatisch opruimen
    const before = timers.length;
    timers = timers.filter(t => Date.now() - t.fireAt < 3600000);
    if(timers.length !== before) saveTimers();

    timersEl.innerHTML = '';
    timers.forEach((t, i) => {
      const left = t.fireAt - Date.now(), done = left <= 0;
      const chip = document.createElement('div');
      chip.className = 'chip' + (done ? ' done' : '');
      chip.innerHTML = '<span>🌾 ' + t.label + '</span><span class="cd">' + (done ? 'klaar ✓' : fmt(left)) + '</span>';
      const x = document.createElement('span');
      x.className = 'x'; x.textContent = '✕';
      x.onclick = () => { timers.splice(i,1); saveTimers(); render(); };
      chip.appendChild(x);
      timersEl.appendChild(chip);
    });
  }

  async function schedule(delay, label){
    if(!topic){ setStatus('Stel eerst onderaan een topicnaam in.', 'err'); return; }
    setStatus('Versturen…');
    try{
      // Bewust geen custom headers of Content-Type: zo blijft dit een "simple"
      // CORS-request zonder preflight. ntfy parseert JSON op de root-URL.
      const res = await fetch(NTFY, {
        method: 'POST',
        body: JSON.stringify({
          topic: topic,
          title: 'Grepolis farm',
          message: 'Tijd om te farmen! (' + label + ')',
          delay: delay,
          tags: ['hourglass_flowing_sand'],
          priority: 4
        })
      });
      if(!res.ok) throw new Error('ntfy status ' + res.status);
      const fireAt = Date.now() + DUR[delay];
      timers.unshift({ label, fireAt });
      timers = timers.slice(0, 8);
      saveTimers(); render();
      setStatus('Gezet ✓  melding om ' + hhmm(new Date(fireAt)), 'ok');
    }catch(e){
      setStatus('Mislukt: ' + e.message + ' — check topic & internet.', 'err');
    }
  }

  document.querySelectorAll('button.timer').forEach(btn => {
    btn.addEventListener('click', () => schedule(btn.dataset.delay, btn.dataset.label));
  });

  render();
  setInterval(render, 1000);
})();
</script>
</body>
</html>
